<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>和みっけ - Wa-mikke</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        'wa-red': '#9f2b2b',    // えんじ色
                        'wa-gold': '#c1a15f',   // 鈍色ゴールド
                        'wa-bg': '#fcfaf2',     // 鳥の子色（和紙のような背景色）
                        'wa-text': '#333333',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f3f4f6; /* 外側の背景 */
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            background-color: #fcfaf2; /* アプリ内の背景 */
            min-height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* ローディングアニメーション */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #f3f3f3;
            border-bottom-color: #9f2b2b;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* カスタムファイルインプットを隠す */
        input[type="file"] {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-wa-text">

    <div class="app-container">
        <!-- Header -->
        <header class="bg-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <div class="bg-wa-red text-white p-1.5 rounded-md">
                    <i data-lucide="scan" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold text-wa-red tracking-wider">和みっけ</h1>
            </div>
            
            <!-- Language Selector -->
            <div class="relative">
                <select id="languageSelect" class="appearance-none bg-wa-bg border border-gray-200 text-sm rounded-full px-4 py-1.5 pr-8 focus:outline-none focus:ring-2 focus:ring-wa-red/50 font-medium">
                    <option value="English">English</option>
                    <option value="Chinese (Traditional)">繁體中文</option>
                    <option value="Chinese (Simplified)">简体中文</option>
                    <option value="Korean">한국어</option>
                    <option value="Spanish">Español</option>
                    <option value="French">Français</option>
                    <option value="Japanese">日本語</option>
                </select>
                <i data-lucide="chevron-down" class="w-4 h-4 absolute right-2.5 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-grow p-5 flex flex-col relative" id="mainContent">
            
            <!-- View: Upload/Camera (Default) -->
            <div id="view-upload" class="flex-grow flex flex-col items-center justify-center fade-in">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2">Discover Japan</h2>
                    <p class="text-gray-500 text-sm">Snap a photo to uncover the hidden stories of Japanese culture.</p>
                </div>

                <div class="w-full max-w-sm aspect-[4/5] bg-white rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center p-6 mb-6 shadow-sm relative overflow-hidden">
                    <div id="imagePreviewContainer" class="absolute inset-0 hidden bg-black">
                        <img id="imagePreview" src="" alt="Preview" class="w-full h-full object-contain">
                    </div>
                    
                    <div id="uploadPrompt" class="flex flex-col items-center">
                        <div class="w-16 h-16 bg-wa-red/10 text-wa-red rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="camera" class="w-8 h-8"></i>
                        </div>
                        <p class="font-medium text-lg mb-1">Take a photo</p>
                        <p class="text-gray-400 text-xs text-center">or upload from gallery</p>
                    </div>
                </div>

                <label class="w-full max-w-sm bg-wa-red hover:bg-red-800 text-white font-bold py-4 px-6 rounded-full flex items-center justify-center gap-2 cursor-pointer transition-colors shadow-md active:scale-95 transform transition-transform">
                    <i data-lucide="aperture" class="w-5 h-5"></i>
                    <span>Scan Object</span>
                    <!-- capture="environment" でスマホの背面カメラを優先起動 -->
                    <input type="file" id="imageInput" accept="image/*" capture="environment">
                </label>
            </div>

            <!-- View: Loading -->
            <div id="view-loading" class="hidden flex-grow flex-col items-center justify-center fade-in">
                <div class="loader mb-6"></div>
                <h3 class="text-xl font-bold text-wa-red mb-2">Analyzing...</h3>
                <p class="text-gray-500 text-sm text-center max-w-xs">AI is reading the cultural context and history of this object.</p>
            </div>

            <!-- View: Result -->
            <div id="view-result" class="hidden flex-grow flex-col pb-20 fade-in">
                <div class="w-full aspect-video bg-black rounded-xl overflow-hidden mb-6 shadow-md relative">
                    <img id="resultImage" src="" alt="Analyzed Image" class="w-full h-full object-cover opacity-80">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 -mt-12 relative z-10">
                    <div class="flex items-start justify-between mb-4">
                        <h2 id="resultTitle" class="text-2xl font-bold text-gray-800 leading-tight"></h2>
                        <button id="speakerBtn" class="text-wa-gold hover:text-yellow-600 p-1">
                            <!-- <i data-lucide="volume-2" class="w-6 h-6"></i> (Future feature: TTS) -->
                        </button>
                    </div>
                    
                    <div class="h-1 w-12 bg-wa-gold rounded-full mb-5"></div>
                    
                    <div class="prose prose-sm text-gray-600 leading-relaxed">
                        <p id="resultDescription"></p>
                    </div>
                </div>

                <button id="resetBtn" class="mt-8 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-full flex items-center justify-center gap-2 mx-auto shadow-sm transition-colors">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    <span>Scan Another</span>
                </button>
            </div>

        </main>
        
        <!-- Error Toast -->
        <div id="errorToast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 text-sm whitespace-nowrap">
            Error message
        </div>
    </div>

    <script>
        // Lucideアイコンの初期化
        lucide.createIcons();

        // Gemini API Configuration
        const apiKey = ""; // 実行環境でAPIキーが提供されます
        
        // DOM Elements
        const views = {
            upload: document.getElementById('view-upload'),
            loading: document.getElementById('view-loading'),
            result: document.getElementById('view-result')
        };
        const imageInput = document.getElementById('imageInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const resultImage = document.getElementById('resultImage');
        const resultTitle = document.getElementById('resultTitle');
        const resultDescription = document.getElementById('resultDescription');
        const resetBtn = document.getElementById('resetBtn');
        const languageSelect = document.getElementById('languageSelect');
        const errorToast = document.getElementById('errorToast');

        // State
        let currentImageBase64 = null;

        // View Controller
        function showView(viewName) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[viewName].classList.remove('hidden');
            
            // Re-initialize icons for newly shown elements
            lucide.createIcons();
        }

        function showError(message) {
            errorToast.textContent = message;
            errorToast.classList.remove('opacity-0');
            setTimeout(() => {
                errorToast.classList.add('opacity-0');
            }, 3000);
        }

        // --- 画像処理 (リサイズとBase64化) ---
        function resizeAndConvertImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // 最大サイズを1024pxに制限
                        const MAX_WIDTH = 1024;
                        const MAX_HEIGHT = 1024;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        // Base64取得 (JPEG 80%品質)
                        const base64String = canvas.toDataURL('image/jpeg', 0.8);
                        // Gemini API用にプレフィックス(data:image/jpeg;base64,)を削除
                        const base64DataOnly = base64String.split(',')[1];
                        
                        resolve({
                            fullBase64: base64String,
                            dataOnly: base64DataOnly
                        });
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // --- APIリクエストロジック (リトライ付き) ---
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const baseDelay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errText}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    // 指数バックオフ: 1s, 2s, 4s, 8s, 16s
                    const delay = baseDelay * Math.pow(2, i);
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        // --- Gemini API 呼び出し ---
        async function analyzeImage(base64Data) {
            const targetLanguage = languageSelect.value;
            
            const systemPrompt = `You are an expert guide on Japanese culture, history, and daily life.
Your task is to identify the main object in the provided image (it could be an appetizer, a statue, architectural detail, everyday item, etc.) and explain its cultural context to a foreign tourist.

Instructions:
1. Identify the object.
2. Explain its cultural background, historical significance, or interesting trivia.
3. Your explanation MUST be in the requested language: ${targetLanguage}.
4. Keep the tone friendly, welcoming, engaging, and easy to understand.
5. YOU MUST RETURN ONLY A VALID JSON OBJECT. Do not include markdown code blocks or any other text outside the JSON.

Expected JSON schema:
{
  "title": "Name of the object in ${targetLanguage}",
  "description": "Detailed explanation of the object, its history, and cultural context in ${targetLanguage}."
}`;

            const payload = {
                systemInstruction: {
                    parts: [{ text: systemPrompt }]
                },
                contents: [
                    {
                        role: "user",
                        parts: [
                            {
                                inlineData: {
                                    mimeType: "image/jpeg",
                                    data: base64Data
                                }
                            }
                        ]
                    }
                ],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const result = await fetchWithRetry(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!textResponse) {
                throw new Error("No response from AI");
            }

            try {
                // markdownのコードブロック表記が万が一入っていた場合を除去
                const cleanJsonStr = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                return JSON.parse(cleanJsonStr);
            } catch (e) {
                console.error("JSON Parse error:", e, textResponse);
                throw new Error("Failed to parse AI response.");
            }
        }

        // --- イベントリスナー ---

        // 画像選択時
        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // プレビュー表示
            imagePreview.src = URL.createObjectURL(file);
            imagePreviewContainer.classList.remove('hidden');
            uploadPrompt.classList.add('hidden');

            try {
                showView('loading');
                
                // 画像のリサイズとBase64変換
                const imageData = await resizeAndConvertImage(file);
                
                // 結果画面用の画像設定
                resultImage.src = imageData.fullBase64;

                // API呼び出し
                const analysisResult = await analyzeImage(imageData.dataOnly);

                // 結果をUIに反映
                resultTitle.textContent = analysisResult.title || "Unknown Object";
                // 改行を維持するためにHTMLにするか、CSSで white-space: pre-wrap を指定
                resultDescription.innerHTML = (analysisResult.description || "Description not available.").replace(/\n/g, '<br>');

                showView('result');

            } catch (error) {
                console.error("Analysis failed:", error);
                showError("Failed to analyze image. Please try again.");
                resetToUpload();
            }
        });

        // リセットボタン
        resetBtn.addEventListener('click', () => {
            resetToUpload();
        });

        function resetToUpload() {
            imageInput.value = ''; // ファイル入力をクリア
            imagePreviewContainer.classList.add('hidden');
            uploadPrompt.classList.remove('hidden');
            showView('upload');
        }

        // 言語切り替え時のUIラベル更新 (簡易的)
        languageSelect.addEventListener('change', (e) => {
            const lang = e.target.value;
            const subtitle = document.querySelector('#view-upload p.text-gray-500');
            const btnText = document.querySelector('label span');
            
            // ここは本格的なアプリでは多言語辞書を用いますが、モックアップとして一部対応
            if (lang === 'Japanese') {
                document.querySelector('#view-upload h2').textContent = '日本の魅力を発見';
                subtitle.textContent = '写真を撮って、日本の文化の隠れた物語を見つけましょう。';
                btnText.textContent = '写真を撮る / 選ぶ';
            } else if (lang === 'English') {
                document.querySelector('#view-upload h2').textContent = 'Discover Japan';
                subtitle.textContent = 'Snap a photo to uncover the hidden stories of Japanese culture.';
                btnText.textContent = 'Scan Object';
            }
        });

    </script>
</body>
</html>
