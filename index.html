<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>和みっけ - Wa-mikke</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        'wa-red': '#9f2b2b',
                        'wa-gold': '#c1a15f',
                        'wa-bg':   '#fcfaf2',
                        'wa-text': '#333333',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .app-container {
            background-color: #fcfaf2;
            min-height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #f3f3f3;
            border-bottom-color: #9f2b2b;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input[type="file"] { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-wa-text">

    <!-- ★ capture なし → OSが「撮る／選ぶ」を自動で出してくれる -->
    <input type="file" id="imageInput" accept="image/*">

    <div class="app-container">

        <!-- Header -->
        <header class="bg-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <div class="bg-wa-red text-white p-1.5 rounded-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
                </div>
                <h1 class="text-xl font-bold text-wa-red tracking-wider">和みっけ</h1>
            </div>
            <div class="relative">
                <select id="languageSelect" class="appearance-none bg-wa-bg border border-gray-200 text-sm rounded-full px-4 py-1.5 pr-8 focus:outline-none focus:ring-2 focus:ring-wa-red/50 font-medium">
                    <option value="English">English</option>
                    <option value="Chinese (Traditional)">繁體中文</option>
                    <option value="Chinese (Simplified)">简体中文</option>
                    <option value="Korean">한국어</option>
                    <option value="Spanish">Español</option>
                    <option value="French">Français</option>
                    <option value="Japanese">日本語</option>
                </select>
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
        </header>

        <!-- Main -->
        <main class="flex-grow p-5 flex flex-col">

            <!-- View: Upload -->
            <div id="view-upload" class="flex-grow flex flex-col items-center justify-center fade-in">
                <div class="text-center mb-8">
                    <h2 id="mainTitle" class="text-2xl font-bold mb-2">Discover Japan</h2>
                    <p id="mainSubtitle" class="text-gray-500 text-sm">Snap a photo to uncover the hidden stories of Japanese culture.</p>
                </div>

                <!-- プレビューエリア -->
                <div class="w-full max-w-sm aspect-[4/5] bg-white rounded-2xl border-2 border-dashed border-gray-300 flex items-center justify-center mb-6 shadow-sm relative overflow-hidden">
                    <div id="imagePreviewContainer" class="absolute inset-0 hidden bg-black">
                        <img id="imagePreview" src="" alt="Preview" class="w-full h-full object-contain">
                    </div>
                    <div id="uploadPrompt" class="flex flex-col items-center p-6">
                        <div class="w-16 h-16 bg-wa-red/10 text-wa-red rounded-full flex items-center justify-center mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                        </div>
                        <p id="promptMain" class="font-medium text-lg mb-1">Tap to scan</p>
                        <p id="promptSub" class="text-gray-400 text-xs text-center">Camera or gallery — your choice</p>
                    </div>
                </div>

                <!-- ボタン1つだけ -->
                <button id="scanBtn" class="w-full max-w-sm bg-wa-red hover:bg-red-800 text-white font-bold py-4 px-6 rounded-full flex items-center justify-center gap-2 transition-colors shadow-md active:scale-95 transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    <span id="scanBtnText">Scan Object</span>
                </button>
            </div>

            <!-- View: Loading -->
            <div id="view-loading" class="hidden flex-grow flex-col items-center justify-center fade-in">
                <div class="loader mb-6"></div>
                <h3 class="text-xl font-bold text-wa-red mb-2">Analyzing...</h3>
                <p class="text-gray-500 text-sm text-center max-w-xs">AI is reading the cultural context and history of this object.</p>
            </div>

            <!-- View: Result -->
            <div id="view-result" class="hidden flex-grow flex-col pb-20 fade-in">
                <div class="w-full aspect-video bg-black rounded-xl overflow-hidden mb-6 shadow-md relative">
                    <img id="resultImage" src="" alt="Analyzed Image" class="w-full h-full object-cover opacity-80">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 -mt-12 relative z-10">
                    <h2 id="resultTitle" class="text-2xl font-bold text-gray-800 leading-tight mb-4"></h2>
                    <div class="h-1 w-12 bg-wa-gold rounded-full mb-5"></div>
                    <p id="resultDescription" class="text-sm text-gray-600 leading-relaxed"></p>
                </div>
                <button id="resetBtn" class="mt-8 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-full flex items-center justify-center gap-2 mx-auto shadow-sm transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
                    <span id="resetBtnText">Scan Another</span>
                </button>
            </div>

        </main>

        <!-- Error Toast -->
        <div id="errorToast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 text-sm whitespace-nowrap">
            Error message
        </div>

    </div>

    <script>
        const WORKER_URL = "https://wa-mikke.yymmatsu.workers.dev";

        const views = {
            upload:  document.getElementById('view-upload'),
            loading: document.getElementById('view-loading'),
            result:  document.getElementById('view-result')
        };
        const imageInput            = document.getElementById('imageInput');
        const scanBtn               = document.getElementById('scanBtn');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview          = document.getElementById('imagePreview');
        const uploadPrompt          = document.getElementById('uploadPrompt');
        const resultImage           = document.getElementById('resultImage');
        const resultTitle           = document.getElementById('resultTitle');
        const resultDescription     = document.getElementById('resultDescription');
        const resetBtn              = document.getElementById('resetBtn');
        const languageSelect        = document.getElementById('languageSelect');
        const errorToast            = document.getElementById('errorToast');

        scanBtn.addEventListener('click', () => imageInput.click());

        function showView(name) {
            Object.values(views).forEach(v => v.classList.add('hidden'));
            views[name].classList.remove('hidden');
        }

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.remove('opacity-0');
            setTimeout(() => errorToast.classList.add('opacity-0'), 3000);
        }

        function resizeAndConvertImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX = 1280;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
                        else       { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        const b64 = canvas.toDataURL('image/jpeg', 0.85);
                        resolve({ fullBase64: b64, dataOnly: b64.split(',')[1] });
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        async function analyzeViaWorker(base64Data) {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ base64Data, language: languageSelect.value })
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `HTTP ${res.status}`);
            }
            return await res.json();
        }

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            imagePreview.src = URL.createObjectURL(file);
            imagePreviewContainer.classList.remove('hidden');
            uploadPrompt.classList.add('hidden');

            try {
                showView('loading');
                const imageData = await resizeAndConvertImage(file);
                resultImage.src = imageData.fullBase64;

                const result = await analyzeViaWorker(imageData.dataOnly);

                resultTitle.textContent     = result.title || "Unknown Object";
                resultDescription.innerHTML = (result.description || "Description not available.").replace(/\n/g, '<br>');
                showView('result');

            } catch (err) {
                console.error(err);
                showError("Failed to analyze image. Please try again.");
                resetToUpload();
            }
        });

        resetBtn.addEventListener('click', resetToUpload);

        function resetToUpload() {
            imageInput.value = '';
            imagePreviewContainer.classList.add('hidden');
            uploadPrompt.classList.remove('hidden');
            showView('upload');
        }

        const i18n = {
            English: {
                mainTitle:     "Discover Japan",
                mainSubtitle:  "Snap a photo to uncover the hidden stories of Japanese culture.",
                promptMain:    "Tap to scan",
                promptSub:     "Camera or gallery — your choice",
                scanBtnText:   "Scan Object",
                resetBtnText:  "Scan Another"
            },
            Japanese: {
                mainTitle:     "日本の魅力を発見",
                mainSubtitle:  "写真を撮って、日本文化の隠れた物語を見つけましょう。",
                promptMain:    "タップしてスキャン",
                promptSub:     "カメラもギャラリーもOK",
                scanBtnText:   "スキャンする",
                resetBtnText:  "もう一度スキャン"
            }
        };

        languageSelect.addEventListener('change', (e) => {
            const t = i18n[e.target.value];
            if (!t) return;
            document.getElementById('mainTitle').textContent    = t.mainTitle;
            document.getElementById('mainSubtitle').textContent = t.mainSubtitle;
            document.getElementById('promptMain').textContent   = t.promptMain;
            document.getElementById('promptSub').textContent    = t.promptSub;
            document.getElementById('scanBtnText').textContent  = t.scanBtnText;
            document.getElementById('resetBtnText').textContent = t.resetBtnText;
        });
    </script>
</body>
</html>
